<!DOCTYPE html>
<html>
<head><title>Gerar ícones HM Finance</title></head>
<body style="background:#111;color:#eee;font-family:sans-serif;padding:20px">
<h2 style="color:#C4A96A">Gerar ícones PWA — HM Finance</h2>
<p>Abre esta página no browser e clica nos botões para descarregar os ícones.</p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<div style="margin:20px 0;display:flex;gap:16px;align-items:center">
  <img id="preview" width="96" height="96" style="border-radius:16px">
  <div>
    <button onclick="gen(192)" style="display:block;margin-bottom:8px;padding:8px 16px;background:#C4A96A;border:none;border-radius:8px;cursor:pointer;font-size:14px">Descarregar icon-192.png</button>
    <button onclick="gen(512)" style="display:block;padding:8px 16px;background:#C4A96A;border:none;border-radius:8px;cursor:pointer;font-size:14px">Descarregar icon-512.png</button>
  </div>
</div>
<script>
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f0f0f"/>
  <rect x="40" y="40" width="432" height="432" rx="72" fill="#181818"/>
  <rect x="90" y="140" width="36" height="232" rx="8" fill="#C4A96A"/>
  <rect x="90" y="236" width="120" height="36" rx="8" fill="#C4A96A"/>
  <rect x="174" y="140" width="36" height="232" rx="8" fill="#C4A96A"/>
  <rect x="240" y="140" width="32" height="232" rx="8" fill="#C4A96A"/>
  <polygon points="256,140 290,220 324,140 324,372 292,372 292,260 256,320 220,260 220,372 188,372 188,140" fill="#C4A96A"/>
  <rect x="90" y="410" width="332" height="6" rx="3" fill="#C4A96A" opacity="0.4"/>
</svg>`;

function gen(size){
  const c=document.getElementById('c'+size);
  const ctx=c.getContext('2d');
  const img=new Image();
  const blob=new Blob([SVG],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  img.onload=function(){
    ctx.clearRect(0,0,size,size);
    ctx.drawImage(img,0,0,size,size);
    const a=document.createElement('a');
    a.download='icon-'+size+'.png';
    a.href=c.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(url);
    if(size===192)document.getElementById('preview').src=c.toDataURL('image/png');
  };
  img.src=url;
}
gen(192);
</script>
</body>
</html>
